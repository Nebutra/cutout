name: Build and Release Cutout

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed release tag to build
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      sha: ${{ steps.authority.outputs.sha }}
    steps:
      - name: Resolve release identity
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must be v-prefixed semantic versioning: $RELEASE_TAG" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          if [[ "$version" == *-* ]]; then
            channel=beta
            prerelease=true
          else
            channel=stable
            prerelease=false
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require a main-line tag and the single release authority
        id: authority
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          release_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          test -n "$release_sha" || { echo "Release tag does not resolve to a commit: $RELEASE_TAG" >&2; exit 1; }
          git merge-base --is-ancestor "$release_sha" refs/remotes/origin/main || {
            echo "Release tag $RELEASE_TAG is not reachable from main." >&2
            exit 1
          }
          node scripts/validate-release-authority.mjs
          set +e
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Release $RELEASE_TAG already exists; immutable assets cannot be replaced." >&2
            exit 1
          fi
          grep -Eq 'HTTP 404|"status"[[:space:]]*:[[:space:]]*"?404' <<<"$existing" || {
            echo "$existing" >&2
            echo "Could not prove that release $RELEASE_TAG is absent." >&2
            exit 1
          }
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"
      - name: Require tag and source versions to match
        run: node scripts/validate-release-version.mjs --expected "${{ steps.release.outputs.version }}"

  quality:
    name: Complete release quality gate
    needs: validate
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
    with:
      source_sha: ${{ needs.validate.outputs.sha }}

  build:
    name: Build ${{ matrix.artifact }}
    needs: [validate, quality]
    environment: release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: release-macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - artifact: release-macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            bundles: app,dmg
          - artifact: release-windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - artifact: release-linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    env:
      CUTOUT_UPDATER_PUBKEY: ${{ vars.CUTOUT_UPDATER_PUBKEY }}
      CUTOUT_UPDATER_ALLOWED_HOSTS: ${{ vars.CUTOUT_UPDATER_ALLOWED_HOSTS || 'github.com' }}
      CUTOUT_UPDATER_STABLE_ENDPOINTS: ${{ vars.CUTOUT_UPDATER_STABLE_ENDPOINTS || format('https://github.com/{0}/releases/latest/download/latest.json', github.repository) }}
      CUTOUT_UPDATER_BETA_ENDPOINTS: ${{ vars.CUTOUT_UPDATER_BETA_ENDPOINTS }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ matrix.target }}
      - name: Install Linux packaging dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential file libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2
      - run: pnpm install --frozen-lockfile
      - name: Require protected updater public configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CUTOUT_UPDATER_PUBKEY" || { echo 'CUTOUT_UPDATER_PUBKEY is required' >&2; exit 1; }
          test -n "$CUTOUT_UPDATER_ALLOWED_HOSTS" || { echo 'CUTOUT_UPDATER_ALLOWED_HOSTS is required' >&2; exit 1; }
          test -n "$CUTOUT_UPDATER_STABLE_ENDPOINTS" || { echo 'CUTOUT_UPDATER_STABLE_ENDPOINTS is required' >&2; exit 1; }
      - name: Inject updater public key into release-only Tauri config
        run: node scripts/prepare-tauri-release-config.mjs
      - name: Exercise safe local workspace bridge
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml reads_authoritative_design_ir_from_cutout_manifest
      - name: Prepare Apple signing and notarization credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CERTIFICATE" || { echo 'APPLE_CERTIFICATE is required' >&2; exit 1; }
          test -n "$APPLE_CERTIFICATE_PASSWORD" || { echo 'APPLE_CERTIFICATE_PASSWORD is required' >&2; exit 1; }
          test -n "$APPLE_SIGNING_IDENTITY" || { echo 'APPLE_SIGNING_IDENTITY is required' >&2; exit 1; }
          test -n "$APPLE_API_KEY" || { echo 'APPLE_API_KEY is required' >&2; exit 1; }
          test -n "$APPLE_API_ISSUER" || { echo 'APPLE_API_ISSUER is required' >&2; exit 1; }
          test -n "$APPLE_API_PRIVATE_KEY" || { echo 'APPLE_API_PRIVATE_KEY is required' >&2; exit 1; }
          [[ "$APPLE_API_KEY" =~ ^[A-Za-z0-9]+$ ]] || { echo 'APPLE_API_KEY must be an alphanumeric App Store Connect key ID' >&2; exit 1; }

          umask 077
          apple_api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$apple_api_key_path" >> "$GITHUB_ENV"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$apple_api_key_path"
          chmod 0600 "$apple_api_key_path"
      - name: Build signed and notarized macOS bundles
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.release.conf.json --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: false
          uploadUpdaterSignatures: false
      - name: Build non-macOS bundles
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.release.conf.json --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: false
          uploadUpdaterSignatures: false
      - name: Notarize and staple macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s nullglob
          dmgs=("$bundle_root/dmg/"*.dmg)
          test "${#dmgs[@]}" -eq 1 || { echo "Expected exactly one macOS DMG, found ${#dmgs[@]}" >&2; exit 1; }

          xcrun notarytool submit "${dmgs[0]}" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "${dmgs[0]}"
      - name: Verify updater artifact signature
        shell: bash
        env:
          BUNDLE_ROOT: src-tauri/target/${{ matrix.target }}/release/bundle
          RUNNER_OS: ${{ runner.os }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          case "$RUNNER_OS" in
            macOS) updater_artifacts=("$BUNDLE_ROOT/macos/"*.app.tar.gz) ;;
            Windows) updater_artifacts=("$BUNDLE_ROOT/nsis/"*.exe) ;;
            Linux) updater_artifacts=("$BUNDLE_ROOT/appimage/"*.AppImage) ;;
            *) echo "Unsupported release runner: $RUNNER_OS" >&2; exit 1 ;;
          esac
          test "${#updater_artifacts[@]}" -eq 1 || { echo "Expected exactly one updater artifact, found ${#updater_artifacts[@]}" >&2; exit 1; }
          updater_artifact="${updater_artifacts[0]}"
          test -f "$updater_artifact.sig" || { echo "Missing updater signature sidecar: $updater_artifact.sig" >&2; exit 1; }
          cargo run --locked --manifest-path src-tauri/Cargo.toml --bin verify-updater-signature -- "$updater_artifact" "$updater_artifact.sig"
      - name: Verify signed and notarized macOS bundles
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          shopt -s nullglob
          apps=("$bundle_root/macos/"*.app)
          dmgs=("$bundle_root/dmg/"*.dmg)
          test "${#apps[@]}" -eq 1 || { echo "Expected exactly one macOS app bundle, found ${#apps[@]}" >&2; exit 1; }
          test "${#dmgs[@]}" -eq 1 || { echo "Expected exactly one macOS DMG, found ${#dmgs[@]}" >&2; exit 1; }

          codesign --verify --deep --strict --verbose=2 "${apps[0]}"
          spctl --assess --type execute --verbose=4 "${apps[0]}"
          xcrun stapler validate "${apps[0]}"
          codesign --verify --deep --strict --verbose=2 "${dmgs[0]}"
          spctl --assess --type open --context context:primary-signature --verbose=4 "${dmgs[0]}"
          xcrun stapler validate "${dmgs[0]}"
      - name: Verify intentionally unsigned Windows installers
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          BUNDLE_ROOT: src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          $ErrorActionPreference = 'Stop'
          $nsis = @(Get-ChildItem (Join-Path $env:BUNDLE_ROOT 'nsis') -Filter *.exe -File)
          $msi = @(Get-ChildItem (Join-Path $env:BUNDLE_ROOT 'msi') -Filter *.msi -File)
          if ($nsis.Count -ne 1) { throw "Expected exactly one NSIS installer, found $($nsis.Count)" }
          if ($msi.Count -ne 1) { throw "Expected exactly one MSI installer, found $($msi.Count)" }
          foreach ($file in @($nsis[0], $msi[0])) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne 'NotSigned') { throw "Expected intentionally unsigned installer $($file.Name), found Authenticode status $($signature.Status)" }
          }
      - name: Remove temporary Apple notarization key
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if test -n "${APPLE_API_KEY_PATH:-}"; then
            rm -f -- "$APPLE_API_KEY_PATH"
          fi
      - name: Launch host-native packaged application
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/smoke-packaged-macos.sh "src-tauri/target/${{ matrix.target }}/release/bundle/macos"
      - name: Upload platform release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Create GitHub Release
    needs: [validate, quality, build]
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      CUTOUT_UPDATER_ALLOWED_HOSTS: ${{ vars.CUTOUT_UPDATER_ALLOWED_HOSTS || 'github.com' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist/release-artifacts
      - name: Collect collision-free release assets
        run: node scripts/collect-release-assets.mjs collect --input dist/release-artifacts --output dist/release-assets
      - name: Generate and validate updater metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          CHANNEL: ${{ needs.validate.outputs.channel }}
          RELEASE_SHA: ${{ needs.validate.outputs.sha }}
        run: |
          set -euo pipefail
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          declare -A globs=(
            [darwin-aarch64]='macos-aarch64-*.app.tar.gz'
            [darwin-x86_64]='macos-x86_64-*.app.tar.gz'
            [windows-x86_64]='windows-x86_64-*.exe'
            [linux-x86_64]='linux-x86_64-*.AppImage'
          )
          platform_args=()
          primary_sig=''
          for key in darwin-aarch64 darwin-x86_64 windows-x86_64 linux-x86_64; do
            mapfile -t artifacts < <(find dist/release-assets -maxdepth 1 -name "${globs[$key]}" -type f -print | LC_ALL=C sort)
            test "${#artifacts[@]}" -eq 1 || { echo "Expected exactly one updater artifact for $key, found ${#artifacts[@]}" >&2; exit 1; }
            artifact="${artifacts[0]}"
            test -f "$artifact.sig" || { echo "Missing updater signature for $key" >&2; exit 1; }
            platform_args+=(--platform "$key=$artifact")
            if [ "$key" = darwin-aarch64 ]; then primary_sig="$artifact.sig"; fi
          done
          pnpm update:generate -- "${platform_args[@]}" --artifact-base-url "$base" --version "$RELEASE_VERSION" --channel "$CHANNEL" --allowed-hosts "$CUTOUT_UPDATER_ALLOWED_HOSTS" --revision "$RELEASE_SHA" --output dist/update
          pnpm update:validate -- --manifest "dist/update/$CHANNEL/latest.json" --signature "$primary_sig" --allowed-hosts "$CUTOUT_UPDATER_ALLOWED_HOSTS"
          cp "dist/update/$CHANNEL/"* dist/release-assets/
          node scripts/collect-release-assets.mjs checksums --directory dist/release-assets
      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/release-assets/*
      - name: Create draft release, upload verified assets, and publish
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          set +e
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" 2>&1)"
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Release $RELEASE_TAG already exists; refusing to replace immutable assets." >&2
            exit 1
          fi
          grep -Eq 'HTTP 404|"status"[[:space:]]*:[[:space:]]*"?404' <<<"$existing" || {
            echo "$existing" >&2
            echo "Could not prove that release $RELEASE_TAG is still absent." >&2
            exit 1
          }
          gh release create "$RELEASE_TAG" dist/release-assets/* --verify-tag --draft --generate-notes --title "Cutout $RELEASE_TAG"
          edit_args=(--draft=false)
          if [[ "$PRERELEASE" == true ]]; then edit_args+=(--prerelease); else edit_args+=(--latest); fi
          gh release edit "$RELEASE_TAG" "${edit_args[@]}"
