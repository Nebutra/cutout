name: Build and Release Cutout

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed release tag to build
        required: true
      rollout:
        description: Deterministic rollout percentage
        required: true
        default: '10'
      previous_version:
        description: Optional older version authorized for rollback metadata
        required: false
      previous_manifest_url:
        description: Optional HTTPS manifest URL for the previous version
        required: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      channel: ${{ steps.release.outputs.channel }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Resolve release identity
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must be v-prefixed semantic versioning: $RELEASE_TAG" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          if [[ "$version" == *-* ]]; then
            channel=beta
            prerelease=true
          else
            channel=stable
            prerelease=false
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require tag and source versions to match
        run: node scripts/validate-release-version.mjs --expected "${{ steps.release.outputs.version }}"
      - run: pnpm test:update-artifacts
      - run: pnpm exec vitest run scripts/validate-release-version.test.ts scripts/collect-release-assets.test.ts scripts/release-workflow.test.ts

  build:
    name: Build ${{ matrix.artifact }}
    needs: validate
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: release-macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - artifact: release-macos-x86_64
            os: macos-14
            target: x86_64-apple-darwin
            bundles: app,dmg
          - artifact: release-windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
          - artifact: release-linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      CUTOUT_UPDATER_PUBKEY: ${{ vars.CUTOUT_UPDATER_PUBKEY }}
      CUTOUT_UPDATER_ALLOWED_HOSTS: ${{ vars.CUTOUT_UPDATER_ALLOWED_HOSTS || 'github.com' }}
      CUTOUT_UPDATER_STABLE_ENDPOINTS: ${{ vars.CUTOUT_UPDATER_STABLE_ENDPOINTS || format('https://github.com/{0}/releases/latest/download/latest.json', github.repository) }}
      CUTOUT_UPDATER_BETA_ENDPOINTS: ${{ vars.CUTOUT_UPDATER_BETA_ENDPOINTS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ matrix.target }}
      - name: Install Linux packaging dependencies
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential file libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2
      - run: pnpm install --frozen-lockfile
      - name: Require protected updater configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo 'TAURI_SIGNING_PRIVATE_KEY is required' >&2; exit 1; }
          test -n "$CUTOUT_UPDATER_PUBKEY" || { echo 'CUTOUT_UPDATER_PUBKEY is required' >&2; exit 1; }
          test -n "$CUTOUT_UPDATER_ALLOWED_HOSTS" || { echo 'CUTOUT_UPDATER_ALLOWED_HOSTS is required' >&2; exit 1; }
          test -n "$CUTOUT_UPDATER_STABLE_ENDPOINTS" || { echo 'CUTOUT_UPDATER_STABLE_ENDPOINTS is required' >&2; exit 1; }
      - name: Exercise safe local workspace bridge
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml reads_authoritative_design_ir_from_cutout_manifest
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          uploadUpdaterJson: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ${{ matrix.artifact }}
          uploadUpdaterSignatures: true
      - name: Launch host-native packaged application
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/smoke-packaged-macos.sh "src-tauri/target/${{ matrix.target }}/release/bundle/macos"

  publish:
    name: Create GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      CUTOUT_UPDATER_ALLOWED_HOSTS: ${{ vars.CUTOUT_UPDATER_ALLOWED_HOSTS || 'github.com' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist/release-artifacts
      - name: Collect collision-free release assets
        run: node scripts/collect-release-assets.mjs collect --input dist/release-artifacts --output dist/release-assets
      - name: Generate and validate updater metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          CHANNEL: ${{ needs.validate.outputs.channel }}
          ROLLOUT: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout || '100' }}
          PREVIOUS_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.previous_version || '' }}
          PREVIOUS_MANIFEST_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.previous_manifest_url || '' }}
        run: |
          set -euo pipefail
          artifact="$(find dist/release-assets -maxdepth 1 -name 'macos-aarch64-*.app.tar.gz' -type f -print -quit)"
          test -n "$artifact" && test -f "$artifact.sig"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          rollback_args=()
          if test -n "$PREVIOUS_VERSION"; then rollback_args+=(--previous-version "$PREVIOUS_VERSION"); fi
          if test -n "$PREVIOUS_MANIFEST_URL"; then rollback_args+=(--previous-manifest-url "$PREVIOUS_MANIFEST_URL"); fi
          pnpm update:generate -- --artifact "$artifact" --version "$RELEASE_VERSION" --channel "$CHANNEL" --rollout "$ROLLOUT" --artifact-url "$base/$(basename "$artifact")" --allowed-hosts "$CUTOUT_UPDATER_ALLOWED_HOSTS" --revision "$GITHUB_SHA" --output dist/update "${rollback_args[@]}"
          pnpm update:validate -- --manifest "dist/update/$CHANNEL/latest.json" --signature "$artifact.sig" --allowed-hosts "$CUTOUT_UPDATER_ALLOWED_HOSTS"
          cp "dist/update/$CHANNEL/"* dist/release-assets/
          node scripts/collect-release-assets.mjs checksums --directory dist/release-assets
      - name: Create draft release, upload verified assets, and publish
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to replace immutable assets." >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" dist/release-assets/* --verify-tag --draft --generate-notes --title "Cutout $RELEASE_TAG"
          edit_args=(--draft=false)
          if [[ "$PRERELEASE" == true ]]; then edit_args+=(--prerelease); else edit_args+=(--latest); fi
          gh release edit "$RELEASE_TAG" "${edit_args[@]}"
