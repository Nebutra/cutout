name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  native:
    name: Native ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: pull-request-${{ matrix.os }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - name: Validate Tauri bundle configuration
        run: pnpm exec vitest run scripts/tauri-config.test.ts scripts/tauri-capabilities.test.ts
      - name: Compile and test native application
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

  contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Chromium
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium
      - run: pnpm agent:validate
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  browser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium
      - name: Run release-critical browser contracts
        run: >-
          pnpm exec playwright test
          tests/visual/home-composer-surface.spec.ts
          tests/visual/update-settings.spec.ts
          --project=desktop-chrome
