name: CI

on:
  workflow_call:
    inputs:
      source_sha:
        description: Exact reviewed source revision to check
        required: false
        type: string
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  native:
    name: Native ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
      - uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri -> target
          key: pull-request-${{ matrix.os }}
      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - name: Validate Tauri bundle configuration
        run: pnpm exec vitest run scripts/tauri-config.test.ts scripts/tauri-capabilities.test.ts
      - name: Compile and test native application
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - name: Check native application
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml

  contract:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and Linux dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Chromium
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium
      - run: pnpm agent:validate
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  browser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium
      - name: Run release-critical browser contracts
        run: >-
          pnpm exec playwright test
          tests/visual/home-composer-surface.spec.ts
          tests/visual/update-settings.spec.ts
          --project=desktop-chrome

  quality:
    name: Quality gate
    if: ${{ always() }}
    needs: [native, contract, browser]
    runs-on: ubuntu-22.04
    steps:
      - name: Require every CI boundary
        env:
          NATIVE_RESULT: ${{ needs.native.result }}
          CONTRACT_RESULT: ${{ needs.contract.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
        run: |
          test "$NATIVE_RESULT" = success
          test "$CONTRACT_RESULT" = success
          test "$BROWSER_RESULT" = success
