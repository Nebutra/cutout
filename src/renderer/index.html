<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset Cutout Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="kicker">Asset Cutout Studio</p>
            <h1>透明 PNG 切片台</h1>
          </div>
          <button id="exportAll" class="primary" disabled>导出全部</button>
        </header>

        <div id="dropZone" class="drop-zone" tabindex="0">
          <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp" />
          <div class="drop-copy">
            <strong>拖入素材总览图</strong>
            <span>或点击选择 PNG / JPG / WEBP</span>
          </div>
        </div>

        <section class="canvas-row">
          <div class="preview-panel">
            <div class="panel-head">
              <span>原图</span>
              <span id="sourceMeta">未载入</span>
            </div>
            <canvas id="sourceCanvas"></canvas>
          </div>
          <div class="preview-panel">
            <div class="panel-head">
              <span>透明化预览</span>
              <span id="transparentMeta">等待处理</span>
            </div>
            <canvas id="transparentCanvas"></canvas>
          </div>
        </section>
      </section>

      <aside class="side-panel">
        <section class="controls">
          <label>
            <span>白底阈值 <b id="thresholdValue">246</b></span>
            <input id="threshold" type="range" min="220" max="255" value="246" />
          </label>
          <label>
            <span>最小面积 <b id="minAreaValue">900</b> px</span>
            <input id="minArea" type="range" min="80" max="5000" step="20" value="900" />
          </label>
          <label>
            <span>合并间距 <b id="mergeGapValue">18</b> px</span>
            <input id="mergeGap" type="range" min="0" max="80" value="18" />
          </label>
          <label>
            <span>导出留边 <b id="paddingValue">10</b> px</span>
            <input id="padding" type="range" min="0" max="40" value="10" />
          </label>
        </section>

        <section class="result-head">
          <div>
            <p class="kicker">Result</p>
            <h2 id="assetCount">0 个切片</h2>
          </div>
          <button id="rerun" class="secondary" disabled>重新分析</button>
        </section>

        <div id="assetGrid" class="asset-grid"></div>
      </aside>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
