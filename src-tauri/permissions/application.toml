[[permission]]
identifier = "project-files"
description = "Allows bounded project asset, bundle and repository scan commands."
commands.allow = ["save_assets", "save_bundle", "scan_repository"]

[[permission]]
identifier = "provider-secrets-network"
description = "Allows host-owned provider secret, discovery/draft and policy-checked AI transport commands."
commands.allow = ["set_key", "key_status", "delete_key", "list_key_status", "load_providers", "save_providers", "discover_provider_candidates", "create_provider_draft", "check_provider_draft", "import_provider_draft", "cancel_provider_draft", "ai_proxy_request", "ai_proxy_stream", "ai_image_edit", "set_vectorizer_api_key", "vectorizer_key_status", "delete_vectorizer_api_key", "vectorize_local_vtracer", "vectorize_vectorizer_ai"]

[[permission]]
identifier = "git-version-control"
description = "Allows read and explicitly-previewed mutation of the authorized project git repository."
commands.allow = ["git_capability", "git_status", "git_log", "git_commit_files", "git_commit_diff", "git_branches", "git_branch_compare", "git_diff", "git_stage", "git_unstage", "git_preview_mutation", "git_apply_mutation", "git_commit", "git_create_branch", "git_switch_branch", "git_push_preview", "git_push"]

[[permission]]
identifier = "registry-and-agent-host"
description = "Allows authorized workspace registry and durable Agent Host lifecycle commands."
commands.allow = ["registry_authorize_workspace", "registry_preview_install", "registry_apply_install", "registry_validate_install", "registry_install_receipt", "agent_host_start", "agent_host_status", "agent_host_shutdown", "agent_host_recover", "agent_host_run_start", "agent_host_node_claim", "agent_host_node_complete", "agent_host_node_heartbeat", "agent_host_node_fail", "agent_host_run_pause", "agent_host_run_resume", "agent_host_run_cancel"]

[[permission]]
identifier = "speech-host"
description = "Allows truthful desktop speech capability and bounded recording session commands."
commands.allow = ["speech_host_capabilities", "speech_microphone_devices", "speech_request_permission", "speech_recording_start", "speech_recording_stop", "speech_recording_cancel"]
