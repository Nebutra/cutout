[[permission]]
identifier = "updater-runtime"
description = "Allows the main desktop window to use Cutout's narrow, policy-checked updater runtime."
commands.allow = [
  "updater_status",
  "updater_check",
  "updater_download",
  "updater_cancel",
  "updater_install_and_relaunch",
]

[[permission]]
identifier = "workspace-revision-bridge"
description = "Allows conflict-checked Design IR revision exchange and bounded Agent run-event persistence for an authorized workspace."
commands.allow = [
  "workspace_revision_read",
  "workspace_revision_preview_export",
  "workspace_revision_apply_export",
  "workspace_run_events_read",
  "workspace_run_events_write",
]
